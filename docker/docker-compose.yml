version: '3.8'
services:

  # ── Kafka 인프라 ─────────────────────────────────────────────────────────────
  # KRaft 모드: Zookeeper 없이 Kafka만으로 클러스터를 운영하는 최신 방식
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"   # 호스트(로컬/EC2)에서 접근할 때 사용
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # 내부(컨테이너 간): PLAINTEXT://kafka:29092
      # 외부(호스트에서): PLAINTEXT_HOST://localhost:9092
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML 서빙 스택 ──────────────────────────────────────────────────────────────
  fastapi:
    build:
      context: ..
      dockerfile: serving/fastapi/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../model/checkpoints:/workspace/model/checkpoints:ro
    environment:
      - DATASET=hdfs
      - CKPT_DIR=/workspace/model/checkpoints/hdfs

  bentoml:
    build:
      context: ..
      dockerfile: serving/bentoml/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - bentoml_home:/root/bentoml
    environment:
      - BENTOML_MODEL_NAME=deeplog
      - BENTOML_MODEL_TAG=latest

  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    volumes:
      - ../serving/triton/models:/models
    ports:
      - "8001:8001"
    command: tritonserver --model-repository=/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  triton-wrapper:
    build:
      context: ..
      dockerfile: serving/triton/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ../serving/triton/models:/workspace/serving/triton/models:ro
    environment:
      - TRITON_URL=triton:8001
      - MODEL_NAME=deeplog
      - MODEL_REPO=/workspace/serving/triton/models
    depends_on:
      - triton

volumes:
  bentoml_home:
